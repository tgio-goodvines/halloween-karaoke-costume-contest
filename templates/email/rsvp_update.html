<!doctype html>
<html lang="en">
  <body style="margin: 0; padding: 0; background: #161516; color: #f6edf0; font-family: 'IBM Plex Mono', 'Courier New', Courier, monospace;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background: #161516; padding: 28px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width: 600px; background: #1a181a; border: 2px solid #e11d48; border-radius: 0; box-shadow: 0 0 24px rgba(225,29,72,0.24);">
            <tr>
              <td style="padding: 28px; background-image: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(225,29,72,0.035) 3px, rgba(225,29,72,0.035) 4px);">
                <p style="display: inline-block; margin: 0 0 12px; padding: 3px 8px; border: 1px solid rgba(225,29,72,0.55); background: rgba(225,29,72,0.12); color: #e11d48; font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase;">{{ party_title }}</p>
                <h1 style="margin: 0 0 18px; color: #ffffff; font-family: Georgia, 'Times New Roman', serif; font-size: 28px; line-height: 1.2; letter-spacing: 0.04em; text-transform: uppercase;">{{ update.title }}</h1>
                <p style="margin: 0 0 24px; color: #f6edf0; font-size: 16px; line-height: 1.6; white-space: pre-wrap;">{{ update.message }}</p>
                <p style="margin: 0 0 24px;">
                  <a href="{{ rsvp_url }}" style="display: inline-block; background: #e11d48; border: 2px solid #e11d48; color: #ffffff; padding: 12px 16px; border-radius: 0; font-weight: 700; letter-spacing: 0.08em; text-decoration: none; text-transform: uppercase;">View RSVP Details</a>
                </p>
                <p style="margin: 0; color: #b9a8b0; font-size: 13px; line-height: 1.5;">You are receiving this because you RSVP'd or created a party account for {{ party_title }}.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
