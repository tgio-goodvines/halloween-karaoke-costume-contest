{% from "email/_components.html" import shell, button %}
{% call shell(party_title, update.title, "You are receiving this because you RSVP'd or created a party account for " ~ party_title ~ ".") %}
  <p style="margin: 0 0 24px; color: #f6edf0; font-size: 16px; line-height: 1.6; white-space: pre-wrap;">{{ update.message }}</p>
  <p style="margin: 0;">{{ button(rsvp_url, "View RSVP Details") }}</p>
{% endcall %}
