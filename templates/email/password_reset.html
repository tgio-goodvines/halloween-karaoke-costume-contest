<!doctype html>
<html lang="en">
  <body style="margin: 0; padding: 0; background: #14090c; color: #fff4e8; font-family: Arial, sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background: #14090c; padding: 24px 12px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width: 560px; background: #241014; border: 1px solid #8f1d2c; border-radius: 8px; overflow: hidden;">
            <tr>
              <td style="padding: 24px;">
                <p style="margin: 0 0 8px; color: #ffb35f; font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;">{{ party_title }}</p>
                <h1 style="margin: 0 0 16px; color: #ffffff; font-size: 26px; line-height: 1.2;">Reset your password</h1>
                <p style="margin: 0 0 18px; color: #fff4e8; font-size: 16px; line-height: 1.55;">Hi {{ account.username }}, use this link to choose a new Halloween Party password. The link expires in 45 minutes.</p>
                <p style="margin: 0 0 24px;">
                  <a href="{{ reset_url }}" style="display: inline-block; background: #c82333; color: #ffffff; padding: 12px 16px; border-radius: 6px; font-weight: 700; text-decoration: none;">Reset Password</a>
                </p>
                <p style="margin: 0; color: #d6b8a8; font-size: 13px; line-height: 1.5;">If you did not request this, you can ignore this email.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
